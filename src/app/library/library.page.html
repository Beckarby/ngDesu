<ion-header class="ion-no-border">
  <ion-toolbar class="library-toolbar">
    <ion-title class="library-title">Library</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-segment [(ngModel)]="selectedSegment" class="library-segment">
    <ion-segment-button value="completed" layout="icon-top">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <ion-label>Completed</ion-label>
    </ion-segment-button>
    <ion-segment-button value="reviews" layout="icon-top">
      <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      <ion-label>Reviews</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="tab-content">
    @if (selectedSegment === 'completed') {
      <div class="anime-grid">
        @for (anime of completedAnime; track anime.id) {
          <app-anime-card [anime]="anime"></app-anime-card>
        }
      </div>
    } @else {
      <div class="reviews-list">
        @for (review of reviews; track review.id) {
          <app-review-card [review]="review" (edit)="openEditReview($event)" (delete)="deleteReview($event)"></app-review-card>
        }
      </div>
    }
  </div>

  <ion-modal
    #editModal
    [breakpoints]="[0, 0.5, 0.75]"
    [initialBreakpoint]="0.5"
    handleBehavior="cycle"
  >
    <ng-template>
      <ion-header class="ion-no-border">
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="closeEditModal()" class="modal-cancel">Cancel</ion-button>
          </ion-buttons>
          <ion-title class="modal-title">Edit Review</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="saveReview()" class="modal-save">Save</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <div class="edit-stars-row">
          @for (starIdx of [1, 2, 3, 4, 5]; track starIdx) {
            <ion-icon
              [name]="starIdx <= editRating ? 'star' : 'star-outline'"
              class="edit-star"
              [class.filled]="starIdx <= editRating"
              (click)="editRating = starIdx"
            ></ion-icon>
          }
        </div>
        <ion-textarea
          [(ngModel)]="editText"
          placeholder="Edit your review..."
          class="edit-textarea"
          rows="6"
          auto-grow
        ></ion-textarea>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
