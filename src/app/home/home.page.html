<ion-header class="ion-no-border">
  <ion-toolbar class="home-toolbar">
    <ion-title class="home-title">Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="section-title">Top Animes</div>

  @if (loading()) {
    <div class="loading-state">
      <ion-spinner name="dots"></ion-spinner>
    </div>
  } @else if (topAnime().length === 0) {
    <div class="empty-state">No top animes available right now.</div>
  } @else {
    <div class="home-list">
      @for (anime of topAnime(); track anime.id) {
        <app-top-anime-card [anime]="anime"></app-top-anime-card>
      }
    </div>
  }
</ion-content>
